version: '3.8'

services:
  neo4j:
    image: neo4j:latest
    container_name: neo4jpan
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/password
      NEO4J_server_memory_heap_initial__size: "64G"
      NEO4J_server_memory_heap_max__size: "64G"
      NEO4J_server_memory_pagecache_size: "64G"
      NEO4J_dbms_memory_transaction_total_max: "100G"
      NEO4J_db_tx__log_rotation_retention__policy: "100M size"
      NEO4J_db_checkpoint_interval_tx: "100000"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - neo4j_import:/var/lib/neo4j/import
      - neo4j_plugins:/plugins
volumes:
  neo4j_data:
  neo4j_logs:
  neo4j_import:
  neo4j_plugins:
